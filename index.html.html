        let currentSlide = 0;
        let syntheticVoice = null;

        // Iniciar Lucide Icons
        function initIcons() {
            lucide.createIcons();
        }

        // Renderizar la diapositiva actual
        function renderSlide() {
            const slide = slidesData[currentSlide];
            const contentContainer = document.getElementById('slide-content');
            const notesContainer = document.getElementById('speaker-notes');
            const counterContainer = document.getElementById('slide-counter');
            const progressBar = document.getElementById('progress-bar');

            // Detener voz si se cambia de diapositiva
            window.speechSynthesis.cancel();
            document.getElementById('toggle-guide').innerHTML = '<i data-lucide="volume-2" class="w-3.5 h-3.5"></i> Leer notas';
            initIcons();

            // Transición del contenido
            contentContainer.classList.add('opacity-0');
            setTimeout(() => {
                contentContainer.innerHTML = slide.content;
                notesContainer.textContent = slide.notes;
                counterContainer.textContent = `Diapositiva ${currentSlide + 1} / ${slidesData.length}`;
                
                // Calcular progreso
                const percentage = ((currentSlide + 1) / slidesData.length) * 100;
                progressBar.style.width = `${percentage}%`;

                // Habilitar / Deshabilitar botones
                document.getElementById('btn-prev').disabled = currentSlide === 0;
                document.getElementById('btn-next').disabled = currentSlide === slidesData.length - 1;

                contentContainer.classList.remove('opacity-0');
                initIcons();
            }, 150);
        }

        // Leer notas en voz alta
        function speakNotes() {
            const toggleButton = document.getElementById('toggle-guide');
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                toggleButton.innerHTML = '<i data-lucide="volume-2" class="w-3.5 h-3.5"></i> Leer notas';
                initIcons();
                return;
            }

            const textToSpeak = slidesData[currentSlide].notes;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            utterance.lang = 'es-PE'; // Español de Perú
            
            utterance.onend = () => {
                toggleButton.innerHTML = '<i data-lucide="volume-2" class="w-3.5 h-3.5"></i> Leer notas';
                initIcons();
            };

            toggleButton.innerHTML = '<i data-lucide="volume-x" class="w-3.5 h-3.5"></i> Silenciar';
            initIcons();
            window.speechSynthesis.speak(utterance);
        }

        // Controladores de eventos
        document.getElementById('btn-next').addEventListener('click', () => {
            if (currentSlide < slidesData.length - 1) {
                currentSlide++;
                renderSlide();
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            currentSlide = 0;
            renderSlide();
        });

        document.getElementById('toggle-guide').addEventListener('click', speakNotes);

        // Control con flechas de teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (currentSlide < slidesData.length - 1) {
                    currentSlide++;
                    renderSlide();
                }
            } else if (e.key === 'ArrowLeft') {
                if (currentSlide > 0) {
                    currentSlide--;
                    renderSlide();
                }
            }
        });

        // Carga inicial
        window.onload = function() {
            renderSlide();
        };
    </script>
